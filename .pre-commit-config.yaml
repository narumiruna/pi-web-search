repos:
  - repo: local
    hooks:
      - id: biome-check
        name: biome check
        entry: npx biome check --write --no-errors-on-unmatched
        language: system
        types_or: [javascript, jsx, ts, tsx, json]
      - id: typecheck
        name: npm typecheck
        entry: npm run typecheck
        language: system
        pass_filenames: false
